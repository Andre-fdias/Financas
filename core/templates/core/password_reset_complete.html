{% extends 'core/base.html' %}

{% block title %}Senha Redefinida{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg text-center">
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
        Senha redefinida com sucesso!
      </h2>
      <p class="mt-4 text-center text-sm text-gray-600">
        Sua senha foi alterada. Agora você pode fazer login com sua nova senha.
      </p>
    </div>
    <div class="mt-6">
        <a href="{% url 'core:login' %}" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
          Ir para o Login
        </a>
      </div>
  </div>
</div>
{% endblock %}
