<!-- core/templates/core/modal_extrato_bancario.html -->
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full mx-4">
        <div class="p-6 relative">
            <button onclick="fecharModalExtrato()" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                <i class="fas fa-times text-xl"></i>
            </button>
            
            <h2 class="text-xl font-semibold text-gray-800 dark:text-white mb-6">
                <i class="fas fa-file-pdf mr-2 text-red-600"></i>
                Emitir Extrato Bancário
            </h2>
            
            <form id="formExtrato" onsubmit="gerarExtrato(event)">
                <!-- Seleção da Conta -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2 dark:text-gray-300">
                        <i class="fas fa-building mr-2"></i>Conta Bancária
                    </label>
                    <select name="conta" id="contaSelect" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                        <option value="">Selecione uma conta...</option>
                        {% for conta in contas %}
                        <option value="{{ conta.id }}">
                            {{ conta.get_nome_banco_display }} - 
                            {{ conta.get_tipo_display }} - 
                            Saldo: R$ {{ conta.saldo_atual|floatformat:2 }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Período -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2 dark:text-gray-300">
                        <i class="fas fa-calendar-alt mr-2"></i>Período
                    </label>
                    <select name="periodo" id="periodoSelect" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                        <option value="30">Últimos 30 dias</option>
                        <option value="60">Últimos 60 dias</option>
                        <option value="90">Últimos 90 dias</option>
                        <option value="120">Últimos 120 dias</option>
                        <option value="180">Últimos 180 dias</option>
                    </select>
                </div>
                
                <!-- Botões -->
                <div class="flex gap-3">
                    <button type="button" onclick="fecharModalExtrato()" class="flex-1 bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" id="btnEmitir" disabled class="flex-1 bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors opacity-50 cursor-not-allowed">
                        <i class="fas fa-file-pdf mr-2"></i>
                        Emitir Extrato
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function fecharModalExtrato() {
    const modal = document.querySelector('.fixed.inset-0.bg-black');
    if (modal) {
        modal.remove();
    }
    document.body.style.overflow = '';
}

function habilitarBotaoEmitir() {
    const contaSelect = document.getElementById('contaSelect');
    const btnEmitir = document.getElementById('btnEmitir');
    
    if (contaSelect.value) {
        btnEmitir.disabled = false;
        btnEmitir.classList.remove('opacity-50', 'cursor-not-allowed');
    } else {
        btnEmitir.disabled = true;
        btnEmitir.classList.add('opacity-50', 'cursor-not-allowed');
    }
}

function gerarExtrato(event) {
    event.preventDefault();
    
    const form = event.target;
    const formData = new FormData(form);
    const params = new URLSearchParams(formData);
    
    showLoading();
    
    fetch(`/extrato/gerar-pdf/?${params.toString()}`, {
        method: 'GET',
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Erro na geração do PDF');
        }
        return response.blob();
    })
    .then(blob => {
        hideLoading();
        fecharModalExtrato();
        
        // Criar link para download
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        a.download = 'extrato_bancario.pdf';
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        
        showNotification('Extrato bancário gerado com sucesso!', 'success');
    })
    .catch(error => {
        hideLoading();
        showNotification('Erro ao gerar extrato bancário', 'error');
        console.error('Error:', error);
    });
}

// Habilitar botão quando conta for selecionada
document.getElementById('contaSelect').addEventListener('change', habilitarBotaoEmitir);

// Fechar modal com ESC
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        fecharModalExtrato();
    }
});

// Fechar modal clicando fora
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('fixed') && e.target.classList.contains('inset-0')) {
        fecharModalExtrato();
    }
});
</script>
