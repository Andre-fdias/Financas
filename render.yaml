databases:
  - name: financas-db
    plan: starter # Plano gratuito, pode ser alterado depois

services:
  # Serviço da Aplicação Web Django
  - type: web
    name: financas-web
    plan: starter # Plano gratuito
    env: docker # Especifica que vamos usar o Dockerfile
    dockerfilePath: ./Dockerfile
    healthCheck:
      path: / # Render irá checar se a aplicação está respondendo nesta rota
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: financas-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: financas.settings.production
      - key: SECRET_KEY
        generateValue: true # Render irá gerar uma secret key segura
      - key: WEB_CONCURRENCY
        value: 4 # Número de workers Gunicorn, bom para o plano starter
      - key: PYTHONUNBUFFERED
        value: 1
      - key: ALLOWED_HOSTS
        value: ${RENDER_EXTERNAL_HOSTNAME}
    autoDeploy: true # Ativa o deploy automático a cada push na branch principal
